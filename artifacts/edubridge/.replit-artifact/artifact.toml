kind = "web"
previewPath = "/"
title = "EduBridge"
version = "1.0.0"
id = "artifacts/edubridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20028

[services.development]
run = "pnpm --filter @workspace/edubridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edubridge", "run", "build" ]
publicDir = "artifacts/edubridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20028"
BASE_PATH = "/"
